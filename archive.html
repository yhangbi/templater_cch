<title>Medical Templater — Locked</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Sarabun', sans-serif;
    background: linear-gradient(135deg, #0a1628 0%, #0e2a4a 40%, #0a1628 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    color: white;
  }
  .gate {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 20px;
    padding: 48px 44px 40px;
    width: 100%; max-width: 400px;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .lock-icon { font-size: 52px; margin-bottom: 18px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .sub { font-size: 14px; opacity: 0.50; margin-bottom: 32px; }
  input[type=password] {
    width: 100%;
    padding: 16px 20px;
    font-size: 18px;
    border-radius: 12px;
    border: 1.5px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    color: white;
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 14px;
    outline: none;
    font-family: 'Courier New', monospace;
    transition: border-color 0.2s;
  }
  input[type=password]:focus { border-color: rgba(100,200,255,0.60); }
  input[type=password]::placeholder { letter-spacing: 1px; font-size: 14px; opacity: 0.45; }
  button {
    width: 100%;
    padding: 15px;
    font-size: 16px; font-weight: 700;
    border-radius: 12px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #0e7490 0%, #0891b2 100%);
    color: white;
    box-shadow: 0 4px 18px rgba(8,145,178,0.40), inset 0 1px 0 rgba(255,255,255,0.20);
    transition: all 0.2s;
    font-family: inherit;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(8,145,178,0.55), inset 0 1px 0 rgba(255,255,255,0.20); }
  button:active { transform: translateY(0); }
  .error {
    margin-top: 14px; font-size: 13px; color: #f87171;
    min-height: 20px; font-weight: 600;
  }
  .footer { margin-top: 32px; font-size: 11px; opacity: 0.25; }
</style>
</head>

// ── Expected password logic ───────────────────────────────────────────────
function getExpectedPassword() {
  const days = ['sun','mon','tue','wed','thu','fri','sat'];
  const now = new Date();
  // Bangkok time (GMT+7)
  const bkk = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Bangkok' }));
  const day = days[bkk.getDay()];
  const date = String(bkk.getDate()).padStart(2, '0');
  return 'yb_' + day + date;
}

// Allow Enter key
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
  document.getElementById('err-msg').textContent = '';
});

// ── Unlock ────────────────────────────────────────────────────────────────
async function unlock() {
  const input = document.getElementById('pw-input').value.trim();
  const expected = getExpectedPassword();

  if (input !== expected) {
    document.getElementById('err-msg').textContent = 'Incorrect password. Try again.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    // Shake animation
    const gate = document.querySelector('.gate');
    gate.style.transition = 'transform 0.07s';
    for (let i = 0; i < 6; i++) {
      await new Promise(r => setTimeout(r, 70));
      gate.style.transform = `translateX(${i % 2 === 0 ? 8 : -8}px)`;
    }
    gate.style.transform = 'none';
    return;
  }

  // Correct — decompress and inject
  try {
    // base64 → Uint8Array
    const binary = atob(PAYLOAD_B64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

    // DecompressionStream (gzip) — supported in modern browsers
    const ds = new DecompressionStream('gzip');
    const writer = ds.writable.getWriter();
    const reader = ds.readable.getReader();
    writer.write(bytes);
    writer.close();

    const chunks = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const totalLen = chunks.reduce((s, c) => s + c.length, 0);
    const result = new Uint8Array(totalLen);
    let offset = 0;
    for (const chunk of chunks) { result.set(chunk, offset); offset += chunk.length; }

    const html = new TextDecoder('utf-8').decode(result);
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    document.getElementById('err-msg').textContent = 'Decryption error: ' + err.message;
  }
}
</script>
</body>
</html>
